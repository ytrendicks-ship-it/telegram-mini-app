<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mines</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a14; color: #e0e0e0; font-family: sans-serif; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .title { font-size: 22px; font-weight: 800; color: #ffd740; }
        .balance { background: #12121f; padding: 10px 18px; border-radius: 25px; color: #00e676; }
        .card { background: #12121f; border-radius: 20px; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 7px; margin-bottom: 15px; }
        .cell { aspect-ratio: 1; background: #1a1a30; border-radius: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 28px; }
        .cell.gem { background: rgba(0,230,118,0.15); border: 2px solid #00e676; }
        .cell.bomb { background: rgba(255,23,68,0.2); border: 2px solid #ff1744; }
        .stats { display: flex; justify-content: space-between; margin: 12px 0; }
        .stat-label { font-size: 10px; color: #888; }
        .stat-value { font-size: 15px; font-weight: 700; }
        .gold { color: #ffd740; } .green { color: #00e676; }
        .section-label { font-size: 12px; color: #888; margin-bottom: 6px; }
        .row { display: flex; gap: 8px; margin-bottom: 12px; }
        input { padding: 12px; background: #1a1a30; border: 2px solid #333; border-radius: 12px; color: #fff; font-size: 15px; text-align: center; width: 100%; }
        input:disabled { opacity: 0.5; }
        .chip-row { display: flex; gap: 6px; margin-top: 8px; }
        .chip { padding: 8px 14px; border: 2px solid #333; border-radius: 20px; background: transparent; color: #888; font-size: 13px; cursor: pointer; }
        .chip.active { border-color: #7c4dff; background: rgba(124,77,255,0.2); color: #fff; }
        .chip:disabled { opacity: 0.4; }
        .play-btn { width: 100%; padding: 15px; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px; }
        .play-btn.start { background: #00e676; color: #000; }
        .play-btn.cashout { background: #ffd740; color: #000; }
        .play-btn.cashout:disabled { background: #555; color: #999; }
        .hidden { display: none !important; }
        .message { text-align: center; font-size: 17px; font-weight: 700; margin: 10px 0; min-height: 24px; }
        .win { color: #00e676; } .lose { color: #ff1744; }
        .btn { padding: 10px 16px; border: none; border-radius: 12px; cursor: pointer; font-size: 14px; font-weight: 700; background: #333; color: #fff; }
        .btn-double { background: #7c4dff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">💣 Mines</div>
            <div class="balance">⭐ <span id="balance">...</span></div>
        </div>
        <div class="card">
            <div class="grid" id="grid"></div>
            <div class="stats">
                <div><div class="stat-label">Множитель</div><div class="stat-value gold" id="mult">1.00x</div></div>
                <div><div class="stat-label">Алмазов</div><div class="stat-value" id="opened">0</div></div>
                <div><div class="stat-label">Выигрыш</div><div class="stat-value green" id="win">0 ⭐</div></div>
            </div>
            <div class="message" id="message"></div>
            <div class="section-label">💵 Сумма ставки</div>
            <div class="row">
                <input type="number" id="bet" value="100" min="10">
                <button class="btn" id="btnHalf" onclick="adjustBet(0.5)">½</button>
                <button class="btn btn-double" id="btnDouble" onclick="adjustBet(2)">2×</button>
            </div>
            <div class="section-label">💣 Количество мин</div>
            <input type="number" id="minesInput" value="3" min="1" max="24" onchange="setMines(parseInt(this.value)||3)">
            <div class="chip-row">
                <button class="chip active" onclick="setMines(3)">3 💣</button>
                <button class="chip" onclick="setMines(5)">5 💣</button>
                <button class="chip" onclick="setMines(10)">10 💣</button>
                <button class="chip" onclick="setMines(24)">24 💣</button>
            </div>
            <button class="play-btn start" id="playBtn" onclick="startGame()">🎮 Играть</button>
            <button class="play-btn cashout hidden" id="cashoutBtn" onclick="cashOut()" disabled>💰 Забрать</button>
        </div>
    </div>
    <script>
        var tg = window.Telegram.WebApp;
tg.expand();
tg.ready();

// === HTTP API синхронизация ===
var API_URL = 'http://localhost:8080/sync';  // Для локального теста
// var API_URL = 'http://ТВОЙ_IP:8080/sync';  // Для сервера

var p = new URLSearchParams(location.search);
var urlBal = parseInt(p.get('balance'));
var balance = (!isNaN(urlBal) && urlBal >= 0) ? urlBal : 1000;

var bet = 100;
var mines = 3;
var gameActive = false;
var canCashout = false;
var grid = [];
var revealed = [];
var opened = 0;
var multiplier = 1;

document.getElementById('balance').textContent = balance;
if (bet > balance) { bet = balance; document.getElementById('bet').value = bet; }

// === Функция синхронизации через HTTP ===
async function syncBalanceAPI() {
    var user = tg.initDataUnsafe?.user;
    if (!user?.id) {
        console.log('Нет user_id, пропускаем синхронизацию');
        return;
    }
    
    try {
        var response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                user_id: user.id,
                balance: balance
            })
        });
        var result = await response.text();
        console.log('Синхронизация: ' + result);
    } catch(e) {
        console.log('Ошибка синхронизации: ' + e.message);
    }
}

// Синхронизируем каждые 5 секунд
setInterval(syncBalanceAPI, 5000);

// И при изменении баланса
function syncIfChanged() {
    syncBalanceAPI();
}

function saveBal() {
    document.getElementById('balance').textContent = balance;
    syncIfChanged();  // Синхронизируем при изменении
}

// === Игровая логика ===
var mults = {
    1: [1.02,1.05,1.10,1.16,1.23,1.31,1.40,1.50,1.62,1.75,1.90,2.07,2.27,2.50,2.77,3.10,3.50,4.00,4.65,5.50,6.60,8.10,10.20,13.50],
    3: [1.08,1.20,1.36,1.55,1.79,2.08,2.44,2.90,3.48,4.23,5.22,6.55,8.40,11.00,14.80,20.50,29.50,45.00],
    5: [1.15,1.35,1.62,1.98,2.45,3.10,4.00,5.25,7.10,9.90,14.30,21.50,34.00,58.00],
    10: [1.35,1.80,2.50,3.60,5.40,8.50,14.00,24.50,46.00,95.00],
    24: [5.00,10.00,25.00,100.00,500.00]
};

function getMults(m) {
    if (mults[m]) return mults[m];
    var arr = [1.05];
    for (var i = 1; i < 25 - m; i++) {
        arr.push(parseFloat((arr[i-1] * 1.15).toFixed(2)));
    }
    return arr;
}

function lockControls(lock) {
    document.getElementById('bet').disabled = lock;
    document.getElementById('minesInput').disabled = lock;
    document.getElementById('btnHalf').disabled = lock;
    document.getElementById('btnDouble').disabled = lock;
    var chips = document.querySelectorAll('.chip');
    for (var i = 0; i < chips.length; i++) { chips[i].disabled = lock; }
}

function setMines(n) {
    if (gameActive || n < 1 || n > 24) return;
    mines = n;
    document.getElementById('minesInput').value = n;
    var chips = document.querySelectorAll('.chip');
    for (var i = 0; i < chips.length; i++) {
        var c = chips[i];
        if (parseInt(c.textContent) === n) { c.classList.add('active'); }
        else { c.classList.remove('active'); }
    }
    initGrid(); renderGrid();
}

function adjustBet(f) {
    if (gameActive) return;
    bet = Math.floor(bet * f);
    if (bet < 10) bet = 10;
    if (bet > balance) bet = balance;
    document.getElementById('bet').value = bet;
}

function initGrid() {
    grid = [];
    revealed = [];
    for (var i = 0; i < 25; i++) { grid.push(false); revealed.push(false); }
    var placed = 0;
    while (placed < mines) {
        var p = Math.floor(Math.random() * 25);
        if (!grid[p]) { grid[p] = true; placed++; }
    }
}

function renderGrid() {
    var html = '';
    for (var i = 0; i < 25; i++) {
        var cls = 'cell';
        if (revealed[i]) { cls += grid[i] ? ' bomb' : ' gem'; }
        var content = revealed[i] ? (grid[i] ? '💣' : '💎') : '';
        html += '<div class="' + cls + '" onclick="clickCell(' + i + ')">' + content + '</div>';
    }
    document.getElementById('grid').innerHTML = html;
}

function startGame() {
    bet = parseInt(document.getElementById('bet').value) || 100;
    if (bet > balance) { alert('Недостаточно!'); return; }
    balance -= bet; saveBal();
    gameActive = true; opened = 0; multiplier = 1; canCashout = false;
    lockControls(true);
    initGrid(); renderGrid(); updateUI();
    document.getElementById('playBtn').classList.add('hidden');
    document.getElementById('cashoutBtn').classList.remove('hidden');
    document.getElementById('cashoutBtn').disabled = true;
    document.getElementById('message').textContent = '';
}

function clickCell(i) {
    if (!gameActive || revealed[i]) return;
    revealed[i] = true;
    
    if (!canCashout) { canCashout = true; document.getElementById('cashoutBtn').disabled = false; }
    
    if (grid[i]) {
        endGame();
        document.getElementById('message').textContent = '💥 Взрыв! -' + bet + ' ⭐';
        document.getElementById('message').className = 'message lose';
        return;
    }
    
    opened++;
    var mList = getMults(mines);
    multiplier = mList[Math.min(opened - 1, mList.length - 1)];
    
    if (opened >= 25 - mines) {
        var win = Math.floor(bet * multiplier);
        balance += win; saveBal();
        endGame();
        document.getElementById('message').textContent = '🎉 Все алмазы! +' + win + ' ⭐';
        document.getElementById('message').className = 'message win';
        return;
    }
    
    renderGrid(); updateUI();
}

function cashOut() {
    if (!gameActive || !canCashout) return;
    var win = Math.floor(bet * multiplier);
    balance += win; saveBal();
    endGame();
    document.getElementById('message').textContent = '🎉 Выигрыш: +' + win + ' ⭐';
    document.getElementById('message').className = 'message win';
}

function endGame() {
    gameActive = false; canCashout = false;
    for (var i = 0; i < 25; i++) { if (grid[i]) revealed[i] = true; }
    lockControls(false);
    renderGrid(); updateUI();
    document.getElementById('playBtn').classList.remove('hidden');
    document.getElementById('cashoutBtn').classList.add('hidden');
}

function updateUI() {
    saveBal();
    document.getElementById('mult').textContent = multiplier.toFixed(2) + 'x';
    document.getElementById('opened').textContent = opened;
    document.getElementById('win').textContent = Math.floor(bet * multiplier) + ' ⭐';
}

initGrid(); renderGrid();
    </script>
</body>
</html>
